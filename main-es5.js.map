<div class="container">
    <div *ngFor="let treball of treballs; let i=index" class="bg-light mb-5 p-3 border" style="box-shadow: 0 0 12px 0px #00000066;">

            <p class="font-weight-light">Pràctica número {{ treball.num }}</p>
            <img src="{{ treball.image }}" alt="foto de {{ treball.name }}" class="w-100 border mb-3">
            <p class="font-weight-bold">{{ treball.name }}</p>
            <p class="mb-3">{{ treball.descripcio }}</p>

    </div>
</div>
